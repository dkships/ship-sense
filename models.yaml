  # probe THERE first when a new id 404s.
  # NO BATCH. The Batch API validator rejects all three: "The provided model
  # 'gpt-5.6-sol' is not supported by the Batch API." (checked 2026-07-09 with a
  # 3-line probe batch; it fails at `validating`, costs nothing, and returns
  # errors[].code == model_not_found on body.model). The per-model doc pages imply
  # Batch is available — they are wrong, or the docs lead the rollout. So
  # batch_supported: false and all three run live, like grok and muse-spark.
